name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v1.0.0)'
        required: true
        type: string
      branch:
        description: 'Branch to build from'
        required: true
        type: choice
        options:
          - fabric/1.20.1
          - quilt/1.20.1
          - forge/1.20.1
          - neoforge/1.20.1
          - neoforge/1.21.1

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      
      - run: chmod +x gradlew
      - run: ./gradlew build --stacktrace
      
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}-${{ github.event.inputs.branch }}
          name: ${{ github.event.inputs.version }} (${{ github.event.inputs.branch }})
          generate_release_notes: true
          files: build/libs/*.jar
