name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch:
          - fabric/1.20.1
          - quilt/1.20.1
          - forge/1.20.1
          - neoforge/1.20.1
          - neoforge/1.21.1
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
      
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      
      - run: chmod +x gradlew
      - run: ./gradlew build --stacktrace
      
      - name: Rename jar with branch name
        run: |
          for jar in build/libs/*.jar; do
            if [[ "$jar" != *"sources"* ]] && [[ "$jar" != *"javadoc"* ]]; then
              BRANCH="${{ matrix.branch }}"
              SAFE_BRANCH="${BRANCH//\//-}"
              DIR=$(dirname "$jar")
              BASENAME=$(basename "$jar" .jar)
              mv "$jar" "$DIR/${BASENAME}-${SAFE_BRANCH}.jar"
            fi
          done
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars-${{ matrix.branch }}
          path: build/libs/*.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-jars
      
      - name: List files
        run: |
          find all-jars -name "*.jar" -exec ls -la {} \;
          mkdir -p release-jars
          find all-jars -name "*.jar" -exec cp {} release-jars/ \;
      
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          generate_release_notes: true
          files: release-jars/*.jar
